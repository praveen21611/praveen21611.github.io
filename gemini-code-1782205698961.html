<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-Day Challenge Tracker</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-success: #4ade80;
            --accent-danger: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.75rem;
            margin: 0 0 4px 0;
            font-weight: 700;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .panel {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .panel-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .timer-display {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .counter-display {
            font-size: 2rem;
            font-weight: 800;
        }

        .counter-total {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .progress-track {
            background-color: var(--border);
            border-radius: 9999px;
            height: 8px;
            width: 100%;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-success);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        button {
            font-size: 1rem;
            font-weight: 600;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action {
            background-color: var(--accent-primary);
            color: var(--bg-dark);
        }

        .btn-action:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-reset {
            background-color: transparent;
            color: var(--accent-danger);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .btn-reset:hover {
            background-color: rgba(248, 113, 113, 0.1);
            border-color: var(--accent-danger);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>3000 Questions</h1>
        <div class="subtitle">15 Days Target Blueprint</div>

        <div class="panel">
            <div class="panel-label">Countdown Timer</div>
            <div class="timer-display" id="timer">15d 00h 00m 00s</div>
        </div>

        <div class="panel">
            <div class="panel-label">Solved Questions</div>
            <div class="counter-display">
                <span id="solved-count">0</span><span class="counter-total"> / 3000</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="btn-stack">
            <button class="btn-action" id="btn-solve">Solve One More</button>
            <button class="btn-reset" id="btn-reset">Reset Progress</button>
        </div>
    </div>

    <script>
        // App State Management (Saves progress locally so it persists on refresh)
        const TOTAL_QUESTIONS = 3000;
        const TOTAL_DURATION_MS = 15 * 24 * 60 * 60 * 1000; // 15 Days in milliseconds

        let state = {
            solved: parseInt(localStorage.getItem('solved_count')) || 0,
            endTime: parseInt(localStorage.getItem('timer_end_time')) || (Date.now() + TOTAL_DURATION_MS)
        };

        // If no end time was stored, set it now
        if (!localStorage.getItem('timer_end_time')) {
            localStorage.setItem('timer_end_time', state.endTime);
        }

        // DOM Nodes
        const solvedCountEl = document.getElementById('solved-count');
        const progressBarEl = document.getElementById('progress-bar');
        const timerEl = document.getElementById('timer');
        const btnSolve = document.getElementById('btn-solve');
        const btnReset = document.getElementById('btn-reset');

        // Update UI View
        function updateUI() {
            // Update counter
            solvedCountEl.textContent = state.solved;
            
            // Update progress bar
            const progressPercent = (state.solved / TOTAL_QUESTIONS) * 100;
            progressBarEl.style.width = `${Math.min(progressPercent, 100)}%`;
        }

        // Live Countdown Calculation
        function updateClock() {
            const now = Date.now();
            const remaining = state.endTime - now;

            if (remaining <= 0) {
                timerEl.textContent = "00d 00h 00m 00s";
                timerEl.style.color = "var(--accent-danger)";
                return;
            }

            const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((remaining % (1000 * 60)) / 1000);

            // Padding single digits with a leading zero
            const d = String(days).padStart(2, '0');
            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');

            timerEl.textContent = `${d}d ${h}h ${m}m ${s}s`;
        }

        // Event Listeners
        btnSolve.addEventListener('click', () => {
            if (state.solved < TOTAL_QUESTIONS) {
                state.solved++;
                localStorage.setItem('solved_count', state.solved);
                updateUI();
            }
        });

        btnReset.addEventListener('click', () => {
            if (confirm("Are you sure you want to reset your progress and the timer?")) {
                state.solved = 0;
                state.endTime = Date.now() + TOTAL_DURATION_MS;
                localStorage.setItem('solved_count', 0);
                localStorage.setItem('timer_end_time', state.endTime);
                timerEl.style.color = "var(--accent-primary)";
                updateUI();
                updateClock();
            }
        });

        // Initialize App Loop
        updateUI();
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
