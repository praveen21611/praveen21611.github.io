<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Storing Workspace</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --border-radius: 16px;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.7;
            margin: 0;
            padding: 0;
        }

        header {
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 100%);
            text-align: center;
            padding: 3.5rem 2rem 2rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-bar { max-width: 800px; margin: 1.5rem auto; padding: 0 1.5rem; }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .container { max-width: 800px; margin: 0 auto 5rem auto; padding: 0 1.5rem; }

        .workspace-panel {
            background: rgba(30, 41, 59, 0.5);
            border-radius: var(--border-radius);
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 2.5rem;
        }

        .form-group { display: flex; flex-direction: column; margin-bottom: 1.25rem; }
        .form-group label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
        
        .form-group textarea {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-save {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .display-canvas {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .display-canvas h2 { margin: 0 0 1.5rem 0; font-size: 1.6rem; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 0.5rem; }
        
        #static-notes { font-size: 1.05rem; color: #cbd5e1; white-space: pre-line; margin-bottom: 2rem; }
        #static-formulas { background: #090d16; border-radius: 8px; padding: 1.25rem; font-family: monospace; color: #38bdf8; border-left: 4px solid var(--primary); white-space: pre-wrap; }
    </style>
</head>
<body>

    <header>
        <h1 id="page-title">Binomial Theorem</h1>
        <p>Self-Contained Study Vault</p>
    </header>

    <div class="nav-bar">
        <a href="index.html" class="back-btn">← Home Dashboard</a>
    </div>

    <div class="container">
        <div class="workspace-panel">
            <div class="form-group">
                <label>My Core Understanding & Explanations</label>
                <textarea id="edit-notes" rows="6" placeholder="Type notes here..."></textarea>
            </div>
            <div class="form-group">
                <label>Key Formulas / Equations Block</label>
                <textarea id="edit-formulas" rows="3" placeholder="Type formulas here..."></textarea>
            </div>
            <button type="button" class="btn-save" onclick="bakeAndDownloadHTML()">💾 Save & Update HTML File</button>
        </div>

        <div class="display-canvas">
            <h2>Saved Reference</h2>
            <div id="static-notes">Initial setup complete. Type your notes above to overwrite this text permanently!</div>
            <div id="static-formulas">No formulas saved yet.</div>
        </div>
    </div>

    <script>
        // On boot, read what is written in the static HTML segments and put it in the editor
        document.getElementById('edit-notes').value = document.getElementById('static-notes').innerText;
        document.getElementById('edit-formulas').value = document.getElementById('static-formulas').innerText;

        function bakeAndDownloadHTML() {
            const freshNotes = document.getElementById('edit-notes').value;
            const freshFormulas = document.getElementById('edit-formulas').value;

            // Update the live viewing panel text elements immediately
            document.getElementById('static-notes').innerText = freshNotes;
            document.getElementById('static-formulas').innerText = freshFormulas;

            // Grab the entire updated text string of this exact open webpage file
            let entirePageCode = document.documentElement.outerHTML;
            
            // Clean up the input textarea element values so they default to your new text on next load
            entirePageCode = entirePageCode.replace(
                /<textarea id="edit-notes"([^>]*)>([\s\S]*?)<\/textarea>/,
                `<textarea id="edit-notes"$1>${escapeHTML(freshNotes)}</textarea>`
            );
            entirePageCode = entirePageCode.replace(
                /<textarea id="edit-formulas"([^>]*)>([\s\S]*?)<\/textarea>/,
                `<textarea id="edit-formulas"$1>${escapeHTML(freshFormulas)}</textarea>`
            );

            // Reassemble the full file package
            const fullBlobContent = "<!DOCTYPE html>\n<html lang=\"en\">\n" + entirePageCode + "\n</html>";
            
            const blob = new Blob([fullBlobContent], { type: "text/html" });
            const downloaderLink = document.createElement("a");
            
            // Deduce the clean matching filename based on the title header
            const fileName = document.getElementById('page-title').innerText.replace(/\s+/g, '-').toLowerCase() + ".html";
            
            downloaderLink.href = URL.createObjectURL(blob);
            downloaderLink.download = fileName;
            downloaderLink.click();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
